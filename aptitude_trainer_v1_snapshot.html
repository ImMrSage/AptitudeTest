<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aptitude Trainer v1</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #22c55e;
      --accent-2: #38bdf8;
      --warn: #f59e0b;
      --bad: #ef4444;
      --good: #22c55e;
      --border: #334155;
      --card: #e5e7eb;
      --question-bg: #f8fafc;
      --question-text: #111827;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #0b1220, #111827 30%, #0f172a);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: rgba(2, 6, 23, 0.92);
      backdrop-filter: blur(6px);
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .toprow {
      display: grid;
      grid-template-columns: 40px 1fr auto 40px;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #0b1220;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
    }

    .title-center {
      text-align: center;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.2px;
    }

    .progress-wrap {
      width: 100%;
      height: 10px;
      background: #1e293b;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #38bdf8);
      width: 0%;
      transition: width 0.25s ease;
    }

    .screen {
      padding: 16px;
      flex: 1;
    }

    .card {
      background: var(--question-bg);
      color: var(--question-text);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
      border: 1px solid #dbeafe;
    }

    .explain-head, .question-head {
      background: #4ea1c9;
      color: white;
      padding: 12px 16px;
      text-align: center;
      font-weight: 700;
      letter-spacing: 0.2px;
      font-size: 18px;
    }

    .question-body, .explain-body {
      padding: 18px 18px 14px;
      line-height: 1.45;
      font-size: 17px;
    }

    .question-text {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
      margin: 14px 0 10px;
      text-align: center;
    }

    .subtle {
      color: #475569;
      font-size: 14px;
    }

    .options {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .option {
      width: 100%;
      text-align: center;
      padding: 18px 14px;
      font-size: 18px;
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      background: white;
      color: #111827;
      cursor: pointer;
      transition: transform 0.08s ease, border-color 0.15s ease, background 0.15s ease;
    }
    .option:active { transform: scale(0.99); }
    .option:hover { border-color: #94a3b8; }
    .option.correct { background: #dcfce7; border-color: #22c55e; }
    .option.wrong { background: #fee2e2; border-color: #ef4444; }
    .option.dim { opacity: 0.72; }

    .bottom-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      border-top: 1px solid var(--border);
      background: #0b1220;
      position: sticky;
      bottom: 0;
    }

    .tab {
      padding: 14px 12px;
      text-align: center;
      color: white;
      border: none;
      background: transparent;
      font-size: 16px;
      cursor: pointer;
    }
    .tab.green { background: #10b981; }
    .tab.blue { background: #1f3b58; }
    .tab.red { background: #7f1d1d; }

    .setup-grid {
      display: grid;
      gap: 14px;
    }

    .setup-card {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    select, input[type="number"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: white;
      font-size: 16px;
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .cta {
      width: 100%;
      padding: 16px 18px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(90deg, #22c55e, #38bdf8);
      color: white;
      font-weight: 800;
      font-size: 17px;
      cursor: pointer;
      margin-top: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #0b1220;
      border: 1px solid var(--border);
      color: white;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
      margin: 0 8px 8px 0;
    }

    .chart {
      background: #f3f4f6;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      padding: 18px 16px;
      margin-top: 10px;
      color: #0f172a;
      font-size: 17px;
      line-height: 1.55;
    }

    .chart strong {
      color: #0b1220;
      font-size: 1.08em;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 86px 1fr 48px;
      align-items: center;
      gap: 10px;
      margin: 12px 0;
      font-size: 18px;
      font-weight: 600;
    }

    .bar-track {
      height: 24px;
      background: #dbeafe;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: #1d4ed8;
      border-radius: 999px;
    }

    .pie-legend {
      display: grid;
      gap: 8px;
      font-size: 16px;
      margin-top: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1e293b;
      font-weight: 600;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      display: inline-block;
    }

    .diagram-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .diagram-cell {
      aspect-ratio: 1;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: white;
      font-size: 34px;
      position: relative;
    }

    .diagram-cell.missing {
      background: repeating-linear-gradient(45deg, #f8fafc, #f8fafc 10px, #eef2ff 10px, #eef2ff 20px);
    }

    .statement {
      background: #eff6ff;
      border-left: 4px solid #38bdf8;
      padding: 14px;
      border-radius: 12px;
      margin: 12px 0;
      font-size: 17px;
      line-height: 1.55;
    }

    .formula-block {
      background: #f8fafc;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 14px;
      margin: 12px 0;
      color: #0f172a;
    }

    .formula-line {
      font-family: Consolas, Monaco, 'Courier New', monospace;
      font-size: 16px;
      line-height: 1.6;
      margin-top: 6px;
      word-break: break-word;
    }

    .explain-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .review-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .review-item {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid var(--border);
      color: white;
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .stat {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }

    .small {
      font-size: 16px;
      color: #334155;
      line-height: 1.5;
      font-weight: 600;
    }

    .big {
      font-size: 28px;
      font-weight: 800;
      margin-top: 6px;
    }

    .hide { display: none !important; }
    .center { text-align: center; }
    .mt8 { margin-top: 8px; }
    .mt12 { margin-top: 12px; }
    .mt16 { margin-top: 16px; }

    @media (max-width: 640px) {
      .question-text { font-size: 24px; }
      .diagram-cell { font-size: 28px; }
      .row-2 { grid-template-columns: 1fr; }
      .bar-row { grid-template-columns: 72px 1fr 40px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="toprow">
        <button class="icon-btn" id="backBtn">←</button>
        <div class="title-center" id="headerTitle">Aptitude Trainer</div>
        <div class="title-center" id="timerLabel">--:--</div>
        <button class="icon-btn" id="skipBtn">→</button>
      </div>
      <div class="progress-wrap"><div class="progress" id="progressBar"></div></div>
    </div>

    <div class="screen" id="screen"></div>

    <div class="bottom-tabs">
      <button class="tab green" id="explainTab">? Explain</button>
      <button class="tab blue" id="statsTab">Stats</button>
      <button class="tab red" id="reportTab">Reset</button>
    </div>
  </div>

  <script>
    const state = {
      mode: 'training',
      topic: 'numerical',
      difficulty: 'medium',
      count: 8,
      questionIndex: 0,
      questions: [],
      answers: [],
      timer: null,
      secondsLeft: 0,
      startedAt: null,
      showExplanation: false,
      sessionDone: false,
      lastView: 'home',
      reviewIndex: null,
      lastQuestionTemplateSignature: null,
      stats: {
        totalSessions: 0,
        totalQuestions: 0,
        correct: 0,
        byTopic: {
          numerical: { total: 0, correct: 0 },
          verbal: { total: 0, correct: 0 },
          logical: { total: 0, correct: 0 },
          concentration: { total: 0, correct: 0 },
          planning: { total: 0, correct: 0 },
          quantitative: { total: 0, correct: 0 },
          mechanical: { total: 0, correct: 0 },
          mixed: { total: 0, correct: 0 }
        }
      }
    };

    const TOPICS = [
      { value: 'numerical', label: 'Numerical reasoning' },
      { value: 'verbal', label: 'Verbal reasoning' },
      { value: 'logical', label: 'Abstract logical reasoning' },
      { value: 'concentration', label: 'Concentration' },
      { value: 'planning', label: 'Planning' },
      { value: 'quantitative', label: 'AP Quantitative' },
      { value: 'mechanical', label: 'Mechanical reasoning' },
      { value: 'mixed', label: 'Assessment Mix' }
    ];

    const DIFFICULTIES = ['easy', 'medium', 'hard'];
    const MODES = [
      { value: 'training', label: 'Training' },
      { value: 'timed', label: 'Timed Test' },
      { value: 'drill', label: 'Drill' }
    ];

    const screen = document.getElementById('screen');
    const progressBar = document.getElementById('progressBar');
    const timerLabel = document.getElementById('timerLabel');
    const headerTitle = document.getElementById('headerTitle');
    const backBtn = document.getElementById('backBtn');
    const skipBtn = document.getElementById('skipBtn');
    const explainTab = document.getElementById('explainTab');
    const statsTab = document.getElementById('statsTab');
    const reportTab = document.getElementById('reportTab');

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function pick(arr) {
      return arr[randInt(0, arr.length - 1)];
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function formatTime(sec) {
      const safe = Math.max(0, Number.isFinite(sec) ? sec : 0);
      const m = Math.floor(safe / 60);
      const s = safe % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function getTimerSeconds(topic, difficulty) {
      const base = {
        numerical: { easy: 70, medium: 55, hard: 45 },
        verbal: { easy: 50, medium: 40, hard: 32 },
        logical: { easy: 40, medium: 32, hard: 26 },
        concentration: { easy: 28, medium: 22, hard: 18 },
        planning: { easy: 55, medium: 45, hard: 36 },
        quantitative: { easy: 75, medium: 60, hard: 48 },
        mechanical: { easy: 45, medium: 35, hard: 28 },
        mixed: { easy: 45, medium: 38, hard: 30 }
      };
      return (base[topic] && base[topic][difficulty]) || 30;
    }

    function stopTimer() {
      if (state.timer) {
        clearInterval(state.timer);
        state.timer = null;
      }
    }

    function getCurrentQuestion() {
      const index = state.reviewIndex != null ? state.reviewIndex : state.questionIndex;
      return state.questions[index] || null;
    }

    function updateProgress() {
      let pct = 0;
      if (state.questions.length > 0) {
        const idx = state.reviewIndex != null
          ? state.reviewIndex + 1
          : Math.min(state.questionIndex + (state.sessionDone ? 1 : 0), state.questions.length);
        pct = (idx / state.questions.length) * 100;
      }
      progressBar.style.width = `${pct}%`;
    }

    function updateHeaderControls() {
      const inSession = state.questions.length > 0 || state.sessionDone;
      backBtn.style.visibility = inSession ? 'visible' : 'hidden';
      skipBtn.style.visibility = inSession && !state.sessionDone ? 'visible' : 'hidden';
      timerLabel.style.visibility = (inSession && state.mode !== 'training') ? 'visible' : 'hidden';
      if (!inSession || state.mode === 'training') {
        timerLabel.textContent = '--:--';
      }
    }

    function startTimer() {
      stopTimer();
      const q = getCurrentQuestion();
      if (!q || state.sessionDone || state.reviewIndex != null || state.mode === 'training') {
        updateHeaderControls();
        timerLabel.textContent = '--:--';
        return;
      }
      state.secondsLeft = q.timer;
      timerLabel.textContent = formatTime(state.secondsLeft);
      state.startedAt = Date.now();
      state.timer = setInterval(() => {
        state.secondsLeft -= 1;
        timerLabel.textContent = formatTime(state.secondsLeft);
        if (state.secondsLeft <= 0) {
          stopTimer();
          autoSubmitTimeout();
        }
      }, 1000);
    }

    function autoSubmitTimeout() {
      if (state.sessionDone || state.reviewIndex != null) return;
      const q = getCurrentQuestion();
      if (!q) return;
      saveAnswer(-1, true);
      if (state.mode === 'training' || state.mode === 'drill') {
        state.showExplanation = true;
      } else {
        state.showExplanation = false;
        if (state.questionIndex < state.questions.length - 1) {
          state.questionIndex += 1;
        } else {
          state.stats.totalSessions += 1;
          state.sessionDone = true;
        }
      }
      render();
    }

    function render() {
      if (state.lastView === 'stats') {
        renderStats();
        return;
      }
      if (state.sessionDone) {
        renderSummary();
        return;
      }
      if (state.reviewIndex != null || state.showExplanation) {
        renderExplanation();
        return;
      }
      if (state.questions.length > 0) {
        renderQuestion();
        return;
      }
      renderHome();
    }

    function renderHome() {
      state.lastView = 'home';
      headerTitle.textContent = 'Aptitude Trainer';
      timerLabel.textContent = '--:--';
      updateProgress();
      updateHeaderControls();
      screen.innerHTML = `
        <div class="setup-grid">
          <div class="setup-card">
            <div style="font-size:26px;font-weight:800;">Assessment Trainer v1</div>
            <div class="small mt8">One question at a time. Real timer. Generated questions. English tasks + RU explanations.</div>
            <div class="mt12">
              <span class="pill">Numerical reasoning</span>
              <span class="pill">Verbal reasoning</span>
              <span class="pill">Abstract logical reasoning</span>
              <span class="pill">Concentration</span>
              <span class="pill">Planning</span>
              <span class="pill">AP Quantitative</span>
              <span class="pill">Mechanical reasoning</span>
            </div>
          </div>

          <div class="setup-card">
            <div class="row-2">
              <div>
                <label for="modeSelect">Mode</label>
                <select id="modeSelect">${MODES.map(m => `<option value="${m.value}" ${m.value === state.mode ? 'selected' : ''}>${m.label}</option>`).join('')}</select>
              </div>
              <div>
                <label for="topicSelect">Topic</label>
                <select id="topicSelect">${TOPICS.map(t => `<option value="${t.value}" ${t.value === state.topic ? 'selected' : ''}>${t.label}</option>`).join('')}</select>
              </div>
            </div>

            <div class="row-2 mt12">
              <div>
                <label for="difficultySelect">Difficulty</label>
                <select id="difficultySelect">${DIFFICULTIES.map(d => `<option value="${d}" ${d === state.difficulty ? 'selected' : ''}>${d[0].toUpperCase()+d.slice(1)}</option>`).join('')}</select>
              </div>
              <div>
                <label for="countInput">Questions</label>
                <input id="countInput" type="number" min="3" max="20" value="${state.count}" />
              </div>
            </div>

            <button class="cta" id="startBtn">Start session</button>
          </div>

          <div class="setup-card">
            <div style="font-size:18px;font-weight:700;">How timer works</div>
            <div class="small mt8">It changes automatically by section and difficulty. AP Quantitative gets more time. Concentration gets less.</div>
            <div class="small mt8">Training/Drill: explanation after each question. Timed Test: explanations at the end by question number.</div>
          </div>
        </div>
      `;

      document.getElementById('modeSelect').onchange = e => state.mode = e.target.value;
      document.getElementById('topicSelect').onchange = e => state.topic = e.target.value;
      document.getElementById('difficultySelect').onchange = e => state.difficulty = e.target.value;
      document.getElementById('countInput').onchange = e => state.count = Math.max(3, Math.min(20, Number(e.target.value) || 8));
      document.getElementById('startBtn').onclick = startSession;
    }

    function startSession() {
      state.count = Math.min(state.count, getUniqueQuestionLimit(state.topic));
      state.questions = generateSession(state.topic, state.difficulty, state.count, state.mode);
      state.answers = new Array(state.questions.length).fill(null);
      state.questionIndex = 0;
      state.reviewIndex = null;
      state.showExplanation = false;
      state.sessionDone = false;
      state.lastView = 'question';
      renderQuestion();
      startTimer();
    }

    function renderQuestion() {
      state.lastView = 'question';
      const q = getCurrentQuestion();
      if (!q) {
        renderSummary();
        return;
      }
      state.lastQuestionTemplateSignature = questionTemplateSignature(q);
      headerTitle.textContent = `${state.reviewIndex != null ? state.reviewIndex + 1 : state.questionIndex + 1} / ${state.questions.length}`;
      updateProgress();
      updateHeaderControls();

      const isAnswered = state.answers[(state.reviewIndex != null ? state.reviewIndex : state.questionIndex)] !== null;
      const answeredObj = state.answers[(state.reviewIndex != null ? state.reviewIndex : state.questionIndex)];

      screen.innerHTML = `
        <div class="setup-grid">
          <div class="card">
            <div class="question-head">${q.topicLabel}</div>
            <div class="question-body">
              ${q.visualHtml || ''}
              <div class="question-text">${q.prompt}</div>
              ${q.subtext ? `<div class="subtle center">${q.subtext}</div>` : ''}
              <div class="options" id="optionsWrap"></div>
            </div>
          </div>
          <button class="cta" id="homeBtn">Main menu</button>
        </div>
      `;
      document.getElementById('homeBtn').onclick = resetToHome;

      const wrap = document.getElementById('optionsWrap');
      q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.innerHTML = opt.html || opt.text;
        if (isAnswered) {
          btn.disabled = true;
          if (idx === q.correctIndex) btn.classList.add('correct');
          else if (answeredObj && idx === answeredObj.answerIndex) btn.classList.add('wrong');
          else btn.classList.add('dim');
        }
        btn.onclick = () => {
          if (state.reviewIndex != null) return;
          stopTimer();
          saveAnswer(idx, false);
          if (state.mode === 'training' || state.mode === 'drill') {
            state.showExplanation = true;
            renderExplanation();
          } else {
            nextQuestion();
          }
        };
        wrap.appendChild(btn);
      });

      if (isAnswered && state.showExplanation) renderExplanation();
    }

    function matchAllNumbers(text) {
      const matches = String(text).match(/-?\d+(?:\.\d+)?/g);
      return matches ? matches.map(Number) : [];
    }

    function buildDetailedExplanationHtml(q) {
      if (q.explanationHtml) return q.explanationHtml;

      if (q.topic === 'numerical' || q.topic === 'quantitative') {
        if (q.variantKey === 'numerical-bar-profit') {
          const scaleMatch = q.visualHtml.match(/1 bar unit = \$(\d+)/);
          const wageMatch = q.visualHtml.match(/Wages for all: \$(\d+) per hour/);
          const hoursMatch = q.visualHtml.match(/Average working hours per month: ([^<]+)/);
          const scale = scaleMatch ? Number(scaleMatch[1]) : 0;
          const wage = wageMatch ? Number(wageMatch[1]) : 0;
          const hours = hoursMatch ? matchAllNumbers(hoursMatch[1]) : [];
          const unitMatches = [...q.visualHtml.matchAll(/<div>(\d+)<\/div>\s*<\/div>/g)].map(m => Number(m[1])).slice(0, 3);
          const names = ['Mike', 'Paul', 'Hugh'];
          const profitLines = names.map((name, i) => {
            const profit = (unitMatches[i] || 0) * scale;
            const wageCost = (hours[i] || 0) * wage;
            return `<div class="formula-line">${name}: ${(unitMatches[i] || 0)} × ${scale} = $${profit.toLocaleString()} ; ${(hours[i] || 0)} × ${wage} = $${wageCost.toLocaleString()}</div>`;
          }).join('');
          return `
            <div><strong>Formula setup</strong></div>
            <div class="formula-block">
              <div class="formula-line">Profit = bar units × bar value</div>
              <div class="formula-line">Wage = hours × hourly wage</div>
              ${profitLines}
            </div>
            <div><strong>Final rule:</strong> choose the people whose profit is at least their wage.</div>
          `;
        }

        if (q.variantKey === 'numerical-pie-growth') {
          const promptNums = matchAllNumbers(q.prompt);
          const totalMatch = q.visualHtml.match(/Total sold: (\d+) million bottles/);
          const regionMatch = q.prompt.match(/sales in (.+?) by \d+%/);
          const total = totalMatch ? Number(totalMatch[1]) : 0;
          const growth = promptNums.length ? promptNums[promptNums.length - 1] : 0;
          const region = regionMatch ? regionMatch[1] : '';
          const regionPctMatch = q.visualHtml.match(new RegExp(region.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ': (\\d+)%'));
          const regionPct = regionPctMatch ? Number(regionPctMatch[1]) : 0;
          const base = total * regionPct / 100;
          const result = base * (1 + growth / 100);
          return `
            <div><strong>Step 1</strong></div>
            <div class="formula-block">
              <div class="formula-line">Base sales = ${total} × ${regionPct}% = ${total} × ${regionPct / 100} = ${base.toFixed(1)} million</div>
            </div>
            <div><strong>Step 2</strong></div>
            <div class="formula-block">
              <div class="formula-line">2021 sales = ${base.toFixed(1)} × (1 + ${growth}/100)</div>
              <div class="formula-line">2021 sales = ${base.toFixed(1)} × ${(1 + growth / 100).toFixed(2)} = ${result.toFixed(1)} million</div>
            </div>
          `;
        }

        if (q.variantKey === 'numerical-loan-fine') {
          const multMatch = q.visualHtml.match(/1 bar unit = ([\d,]+) loans/);
          const mult = multMatch ? Number(multMatch[1].replace(/,/g, '')) : 0;
          const values = [...q.visualHtml.matchAll(/<div>(\d+)<\/div>\s*<\/div>/g)].map(m => Number(m[1])).slice(0, 5);
          const promptNums = matchAllNumbers(q.prompt);
          const ratio = promptNums[0] || 1;
          const fine = promptNums[1] || 0;
          const totalUnits = values.reduce((a, b) => a + b, 0);
          const totalLoans = totalUnits * mult;
          const late = totalLoans / ratio;
          const income = late * fine;
          return `
            <div class="formula-block">
              <div class="formula-line">Total units = ${values.join(' + ')} = ${totalUnits}</div>
              <div class="formula-line">Total loans = ${totalUnits} × ${mult.toLocaleString()} = ${totalLoans.toLocaleString()}</div>
              <div class="formula-line">Late loans = ${totalLoans.toLocaleString()} ÷ ${ratio} = ${late.toLocaleString()}</div>
              <div class="formula-line">Fine income = ${late.toLocaleString()} × $${fine} = $${Math.round(income).toLocaleString()}</div>
            </div>
          `;
        }

        if (q.variantKey === 'numerical-factory-output') {
          const itemMatch = q.prompt.match(/did (Line [A-D]) produce/);
          const lineName = itemMatch ? itemMatch[1] : '';
          const rowMatch = q.visualHtml.match(new RegExp(`${lineName}: (\\d+) units, defect rate (\\d+)%`));
          if (rowMatch) {
            const units = Number(rowMatch[1]);
            const defect = Number(rowMatch[2]);
            const good = Math.round(units * (1 - defect / 100));
            return `
              <div class="formula-block">
                <div class="formula-line">Usable rate = 100% - ${defect}% = ${100 - defect}%</div>
                <div class="formula-line">Good units = ${units} × ${(100 - defect) / 100} = ${good}</div>
              </div>
            `;
          }
        }

        if (q.variantKey === 'numerical-discount-table') {
          const qtyMatch = q.prompt.match(/for (\d+) units of (.+?)\?/);
          const qty = qtyMatch ? Number(qtyMatch[1]) : 0;
          const product = qtyMatch ? qtyMatch[2] : '';
          const priceMatch = q.visualHtml.match(new RegExp(product.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ': \\$(\\d+(?:\\.\\d+)?) each'));
          const discountMatch = q.visualHtml.match(/Bulk discount: (\d+)%/);
          if (priceMatch && discountMatch) {
            const price = Number(priceMatch[1]);
            const discount = Number(discountMatch[1]);
            const original = qty * price;
            const total = original * (1 - discount / 100);
            return `
              <div class="formula-block">
                <div class="formula-line">Original total = ${qty} × $${price.toFixed(2)} = $${original.toFixed(2)}</div>
                <div class="formula-line">Discounted total = $${original.toFixed(2)} × ${(1 - discount / 100).toFixed(2)} = $${total.toFixed(2)}</div>
              </div>
            `;
          }
        }

        if (q.variantKey === 'numerical-averages-mean' || q.variantKey === 'numerical-averages-missing') {
          const scores = [...q.visualHtml.matchAll(/: (\d+) points/g)].map(m => Number(m[1]));
          const total = scores.reduce((a, b) => a + b, 0);
          if (q.variantKey === 'numerical-averages-mean') {
            return `
              <div class="formula-block">
                <div class="formula-line">Total = ${scores.join(' + ')} = ${total}</div>
                <div class="formula-line">Average = ${total} ÷ ${scores.length} = ${(total / scores.length).toFixed(0)}</div>
              </div>
            `;
          }
          const avgMatch = q.prompt.match(/average to be (\d+)/);
          const nameMatch = q.prompt.match(/must (.+?) have/);
          if (avgMatch && nameMatch) {
            const avg = Number(avgMatch[1]);
            const requiredTotal = avg * scores.length;
            return `
              <div class="formula-block">
                <div class="formula-line">Required total = ${avg} × ${scores.length} = ${requiredTotal}</div>
                <div class="formula-line">Missing score = required total - known scores</div>
                <div class="formula-line">Missing score = ${requiredTotal} - (${scores.join(' + ')} - ${nameMatch[1]})</div>
              </div>
            `;
          }
        }

        if (q.variantKey === 'numerical-time-work') {
          const nums = matchAllNumbers(q.visualHtml);
          const a = nums[0] || 1;
          const b = nums[1] || 1;
          const rate = 1 / a + 1 / b;
          return `
            <div class="formula-block">
              <div class="formula-line">Rate A = 1/${a}</div>
              <div class="formula-line">Rate B = 1/${b}</div>
              <div class="formula-line">Combined rate = ${(1 / a).toFixed(3)} + ${(1 / b).toFixed(3)} = ${rate.toFixed(3)}</div>
              <div class="formula-line">Time = 1 ÷ ${rate.toFixed(3)} = ${(1 / rate).toFixed(1)} hours</div>
            </div>
          `;
        }

        if (q.variantKey === 'numerical-table-diff' || q.variantKey === 'numerical-table-winner') {
          const monthMatch = q.prompt.match(/in (\w+)/);
          const month = monthMatch ? monthMatch[1] : '';
          const rowMatch = q.visualHtml.match(new RegExp(`${month}: East (\\d+) \\| West (\\d+)`));
          if (rowMatch) {
            const east = Number(rowMatch[1]);
            const west = Number(rowMatch[2]);
            return `
              <div class="formula-block">
                <div class="formula-line">Use only the ${month} row: East = ${east}, West = ${west}</div>
                <div class="formula-line">${q.variantKey === 'numerical-table-diff' ? `Difference = |${east} - ${west}| = ${Math.abs(east - west)}` : `Larger value = ${east > west ? 'East' : 'West'}`}</div>
              </div>
            `;
          }
        }
      }

      if (q.topic === 'mechanical') {
        if (q.variantKey.includes('Gear A turns clockwise')) {
          return `
            <div class="formula-block">
              <div class="formula-line">Rule: touching gears always rotate in opposite directions.</div>
              <div class="formula-line">Gear A = clockwise</div>
              <div class="formula-line">Gear B = counterclockwise</div>
              <div class="formula-line">Gear C = opposite of B = clockwise</div>
            </div>
            <div class="explain-list">
              <div>Each contact reverses the direction once.</div>
              <div>With three gears in a chain, the first and third rotate in the same direction.</div>
            </div>
          `;
        }

        if (q.variantKey.includes('ramp needs less force')) {
          return `
            <div class="formula-block">
              <div class="formula-line">Same load + same final height</div>
              <div class="formula-line">Longer ramp -> smaller slope angle -> less force needed at each moment</div>
            </div>
            <div class="explain-list">
              <div>An inclined plane trades force for distance.</div>
              <div>A gentler ramp spreads the lift over a longer path, so the force required is lower.</div>
            </div>
          `;
        }

        if (q.variantKey.includes('lever has the load close')) {
          return `
            <div class="formula-block">
              <div class="formula-line">Turning effect (moment) = force × distance from pivot</div>
              <div class="formula-line">Longer effort arm -> larger moment for the same applied force</div>
            </div>
            <div class="explain-list">
              <div>Because the load is close to the pivot, its load arm is short.</div>
              <div>Because effort is applied far from the pivot, you gain mechanical advantage.</div>
            </div>
          `;
        }

        if (q.variantKey.includes('Two pulleys lift the same load')) {
          return `
            <div class="formula-block">
              <div class="formula-line">More supporting rope segments -> greater mechanical advantage</div>
              <div class="formula-line">Greater mechanical advantage -> less input force needed</div>
            </div>
            <div class="explain-list">
              <div>System B shares the load across more rope segments than System A.</div>
              <div>That reduces the effort needed to lift the same weight.</div>
            </div>
          `;
        }

        if (q.variantKey.includes('metal rod is heated')) {
          return `
            <div class="formula-block">
              <div class="formula-line">Most metals expand when heated.</div>
              <div class="formula-line">Heating increases particle vibration, which slightly increases the average spacing.</div>
            </div>
            <div class="explain-list">
              <div>That means the rod becomes longer, not shorter.</div>
              <div>This is the basic idea behind thermal expansion.</div>
            </div>
          `;
        }
      }

      return '';
    }

    function renderExplanation() {
      state.lastView = 'explanation';
      const idx = state.reviewIndex != null ? state.reviewIndex : state.questionIndex;
      const q = state.questions[idx];
      const ans = state.answers[idx];
      const detailedExplanationHtml = buildDetailedExplanationHtml(q);
      const optionsHtml = q.options.map((opt, optIdx) => {
        const classes = [
          'option',
          optIdx === q.correctIndex ? 'correct' : '',
          ans && ans.answerIndex >= 0 && optIdx === ans.answerIndex && optIdx !== q.correctIndex ? 'wrong' : '',
          ans && optIdx !== q.correctIndex && (!ans || optIdx !== ans.answerIndex) ? 'dim' : ''
        ].filter(Boolean).join(' ');
        return `<button class="${classes}" disabled>${opt.html || opt.text}</button>`;
      }).join('');
      headerTitle.textContent = `${idx + 1} / ${state.questions.length}`;
      updateProgress();
      updateHeaderControls();
      timerLabel.textContent = state.mode === 'training'
        ? '--:--'
        : (ans && ans.timedOut ? '00:00' : formatTime(Math.max(0, state.secondsLeft)));
      screen.innerHTML = `
        <div class="setup-grid">
          <div class="card">
            <div class="explain-head">Explanation</div>
            <div class="explain-body">
              ${q.visualHtml || ''}
              <div class="question-text">${q.prompt}</div>
              ${q.subtext ? `<div class="subtle center">${q.subtext}</div>` : ''}
              <div class="options">${optionsHtml}</div>
              <div class="mt12"></div>
              <div><strong>Correct answer:</strong> ${q.options[q.correctIndex].plain}</div>
              ${ans && ans.answerIndex >= 0 ? `<div class="mt8"><strong>Your answer:</strong> ${q.options[ans.answerIndex].plain}</div>` : '<div class="mt8"><strong>Your answer:</strong> Time out</div>'}
              <div class="statement mt12">${detailedExplanationHtml || q.explanation}</div>
              <div class="mt12"><strong>What to remember:</strong> ${q.pattern}</div>
              <button class="cta" id="nextBtn">${state.reviewIndex != null ? 'Back to review' : (state.questionIndex === state.questions.length - 1 ? 'Finish session' : 'Next question')}</button>
            </div>
          </div>
          <button class="cta" id="homeBtn">Main menu</button>
        </div>
      `;
      document.getElementById('nextBtn').onclick = () => {
        if (state.reviewIndex != null) {
          state.reviewIndex = null;
          renderSummary();
          return;
        }
        nextQuestion();
      };
      document.getElementById('homeBtn').onclick = resetToHome;
    }

    function renderSummary() {
      stopTimer();
      state.sessionDone = true;
      state.lastView = 'summary';
      headerTitle.textContent = 'Summary';
      timerLabel.textContent = '--:--';
      updateProgress();
      updateHeaderControls();

      const total = state.answers.length;
      const correct = state.answers.filter((a, i) => a && a.answerIndex === state.questions[i].correctIndex).length;
      const accuracy = total ? Math.round((correct / total) * 100) : 0;
      const weakTopic = findWeakTopic();

      screen.innerHTML = `
        <div class="setup-grid">
          <div class="setup-card">
            <div style="font-size:24px;font-weight:800;">Session complete</div>
            <div class="stat-grid">
              <div class="stat"><div class="small">Score</div><div class="big">${correct} / ${total}</div></div>
              <div class="stat"><div class="small">Accuracy</div><div class="big">${accuracy}%</div></div>
            </div>
            <div class="mt12 small">Weak area hint: ${weakTopic}</div>
            <button class="cta" id="newSessionBtn">New session</button>
          </div>

          <div class="setup-card">
            <div style="font-size:18px;font-weight:700;">Review explanations</div>
            <div class="review-list">
              ${state.questions.map((q, i) => {
                const a = state.answers[i];
                const ok = a && a.answerIndex === q.correctIndex;
                return `<div class="review-item" data-review="${i}">Q${i + 1} — ${q.topicLabel} — ${ok ? 'Correct' : 'Incorrect / timeout'}</div>`;
              }).join('')}
            </div>
          </div>
        </div>
      `;

      document.getElementById('newSessionBtn').onclick = resetToHome;
      document.querySelectorAll('[data-review]').forEach(el => {
        el.onclick = () => {
          state.reviewIndex = Number(el.getAttribute('data-review'));
          renderExplanation();
        };
      });
    }

    function renderStats() {
      state.lastView = 'stats';
      headerTitle.textContent = 'Stats';
      timerLabel.textContent = '--:--';
      updateProgress();
      updateHeaderControls();
      const s = state.stats;
      const accuracy = s.totalQuestions ? Math.round((s.correct / s.totalQuestions) * 100) : 0;
      screen.innerHTML = `
        <div class="setup-grid">
          <div class="setup-card">
            <div style="font-size:22px;font-weight:800;">Overall</div>
            <div class="stat-grid">
              <div class="stat"><div class="small">Sessions</div><div class="big">${s.totalSessions}</div></div>
              <div class="stat"><div class="small">Accuracy</div><div class="big">${accuracy}%</div></div>
            </div>
          </div>
          <div class="setup-card">
            <div style="font-size:18px;font-weight:700;">By topic</div>
            <div class="review-list">
              ${Object.entries(s.byTopic).map(([k, v]) => {
                const pct = v.total ? Math.round((v.correct / v.total) * 100) : 0;
                return `<div class="review-item">${topicLabel(k)} — ${v.correct}/${v.total} — ${pct}%</div>`;
              }).join('')}
            </div>
          </div>
          <button class="cta" id="homeBtn">Main menu</button>
        </div>
      `;
      document.getElementById('homeBtn').onclick = resetToHome;
    }

    function saveAnswer(answerIndex, timedOut) {
      const idx = state.questionIndex;
      const q = state.questions[idx];
      state.answers[idx] = { answerIndex, timedOut: !!timedOut };
      state.stats.totalQuestions += 1;
      state.stats.byTopic[q.topic].total += 1;
      if (answerIndex === q.correctIndex) {
        state.stats.correct += 1;
        state.stats.byTopic[q.topic].correct += 1;
      }
    }

    function nextQuestion() {
      state.showExplanation = false;
      state.reviewIndex = null;
      if (state.questionIndex >= state.questions.length - 1) {
        state.stats.totalSessions += 1;
        renderSummary();
        return;
      }
      state.questionIndex += 1;
      renderQuestion();
      startTimer();
    }

    function resetToHome() {
      stopTimer();
      state.questions = [];
      state.answers = [];
      state.questionIndex = 0;
      state.reviewIndex = null;
      state.showExplanation = false;
      state.sessionDone = false;
      renderHome();
    }

    function goBack() {
      if (state.lastView === 'home') return;
      if (state.lastView === 'stats') {
        if (state.sessionDone) {
          renderSummary();
        } else if (state.questions.length > 0) {
          renderQuestion();
          startTimer();
        } else {
          renderHome();
        }
        return;
      }
      if (state.lastView === 'summary') {
        resetToHome();
        return;
      }
      if (state.lastView === 'explanation') {
        if (state.reviewIndex != null) {
          state.reviewIndex = null;
          renderSummary();
        } else {
          state.showExplanation = false;
          renderQuestion();
          startTimer();
        }
        return;
      }
      if (state.lastView === 'question') {
        resetToHome();
        return;
      }
      renderHome();
    }

    backBtn.onclick = goBack;
    skipBtn.onclick = () => {
      if (state.sessionDone || state.questions.length === 0 || state.showExplanation || state.reviewIndex != null) return;
      stopTimer();
      saveAnswer(-1, true);
      if (state.mode === 'training' || state.mode === 'drill') {
        state.showExplanation = true;
        renderExplanation();
      } else {
        nextQuestion();
      }
    };
    explainTab.onclick = () => {
      if (state.questions.length === 0) return;
      const hasAnswer = state.answers[state.questionIndex] !== null;
      if (state.showExplanation || state.reviewIndex != null || hasAnswer) {
        renderExplanation();
      }
    };
    statsTab.onclick = renderStats;
    reportTab.onclick = resetToHome;

    function findWeakTopic() {
      let worst = 'No data yet';
      let worstPct = Infinity;
      for (const [k, v] of Object.entries(state.stats.byTopic)) {
        if (v.total === 0) continue;
        const pct = v.correct / v.total;
        if (pct < worstPct) {
          worstPct = pct;
          worst = topicLabel(k);
        }
      }
      return worst;
    }

    function topicLabel(k) {
      return ({
        numerical: 'Numerical reasoning',
        verbal: 'Verbal reasoning',
        logical: 'Abstract logical reasoning',
        concentration: 'Concentration',
        planning: 'Planning',
        quantitative: 'AP Quantitative',
        mechanical: 'Mechanical reasoning',
        mixed: 'Assessment Mix'
      })[k] || k;
    }

    function questionTemplateSignature(q) {
      return `${q.topic}|${q.variantKey || q.prompt}`;
    }

    function questionSignature(q) {
      const optionsSig = (q.options || []).map(opt => opt.plain || opt.text || opt.html || '').join('||');
      return `${questionTemplateSignature(q)}|${q.prompt}|${q.visualHtml || ''}|${optionsSig}`;
    }

    function getUniqueQuestionLimit(topic) {
      const limits = {
        verbal: 6,
        concentration: 5,
        logical: 5,
        quantitative: 5,
        mechanical: 5
      };
      return limits[topic] || 20;
    }

    function generateSession(topic, difficulty, count, mode) {
      const list = [];
      const pool = topic === 'mixed'
        ? ['numerical', 'verbal', 'logical', 'concentration', 'planning', 'quantitative', 'mechanical']
        : [topic];
      let previousTemplateSignature = state.lastQuestionTemplateSignature;
      const usedSignatures = new Set();

      for (let i = 0; i < count; i++) {
        const t = topic === 'mixed' ? pool[i % pool.length] : pool[0];
        let q = generateQuestion(t, difficulty, mode);
        let signature = questionSignature(q);
        let templateSignature = questionTemplateSignature(q);
        for (let attempt = 0; attempt < 24 && (usedSignatures.has(signature) || templateSignature === previousTemplateSignature); attempt++) {
          q = generateQuestion(t, difficulty, mode);
          signature = questionSignature(q);
          templateSignature = questionTemplateSignature(q);
        }
        previousTemplateSignature = templateSignature;
        usedSignatures.add(signature);
        list.push({ ...q, id: `${q.topic}-${Date.now()}-${i}` });
      }
      return list;
    }

    function generateQuestion(topic, difficulty, mode) {
      switch (topic) {
        case 'numerical': return generateNumerical(difficulty, mode);
        case 'verbal': return generateVerbal(difficulty, mode);
        case 'logical': return generateLogical(difficulty, mode);
        case 'concentration': return generateConcentration(difficulty, mode);
        case 'planning': return generatePlanning(difficulty, mode);
        case 'quantitative': return generateQuantitative(difficulty, mode);
        case 'mechanical': return generateMechanical(difficulty, mode);
        case 'mixed': return generateQuantitative(difficulty, mode);
        default: return generateNumerical(difficulty, mode);
      }
    }

    function pieSvg(cx, cy, r, percentages, colors) {
      let startAngle = -Math.PI / 2;
      return percentages.map((pct, i) => {
        const angle = (pct / 100) * Math.PI * 2;
        const endAngle = startAngle + angle;
        const x1 = cx + r * Math.cos(startAngle);
        const y1 = cy + r * Math.sin(startAngle);
        const x2 = cx + r * Math.cos(endAngle);
        const y2 = cy + r * Math.sin(endAngle);
        const largeArc = angle > Math.PI ? 1 : 0;
        const path = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`;
        startAngle = endAngle;
        return `<path d="${path}" fill="${colors[i % colors.length]}"></path>`;
      }).join('');
    }

    function generateNumerical(difficulty) {
      const types = difficulty === 'easy'
        ? ['bar-profit', 'pie-growth', 'factory-output', 'averages']
        : difficulty === 'medium'
        ? ['bar-profit', 'pie-growth', 'loan-fine', 'factory-output', 'discount-table', 'averages', 'time-work']
        : ['bar-profit', 'pie-growth', 'loan-fine', 'factory-output', 'discount-table', 'averages', 'time-work', 'table-comparison'];
      const type = pick(types);
      if (type === 'bar-profit') return numericalBarProfit(difficulty);
      if (type === 'loan-fine') return numericalLoanFine(difficulty);
      if (type === 'factory-output') return numericalFactoryOutput(difficulty);
      if (type === 'discount-table') return numericalDiscountTable(difficulty);
      if (type === 'averages') return numericalAverages(difficulty);
      if (type === 'time-work') return numericalTimeWork(difficulty);
      if (type === 'table-comparison') return numericalTableComparison(difficulty);
      return numericalPieGrowth(difficulty);
    }

    function numericalBarProfit(difficulty) {
      const wage = pick([18, 20, 22, 25]);
      const scale = pick([200, 300, 400, 500]);
      const names = ['Mike', 'Paul', 'Hugh'];
      const hours = difficulty === 'easy'
        ? [randInt(140, 170), randInt(150, 180), randInt(160, 190)]
        : [randInt(150, 190), randInt(160, 200), randInt(170, 210)];
      const janUnits = [randInt(10, 24), randInt(8, 18), randInt(18, 32)];
      const profits = janUnits.map(x => x * scale);
      const wages = hours.map(h => h * wage);
      const enough = names.filter((_, i) => profits[i] >= wages[i]);
      const answerText = enough.length === 0 ? 'None of them' : enough.length === 3 ? 'They all did' : enough.join(' and ');
      const options = shuffle([
        answerText,
        'They all did',
        `${names[0]} and ${names[2]}`,
        `${names[0]} and ${names[1]}`
      ].filter((v, i, a) => a.indexOf(v) === i));
      const correctIndex = options.indexOf(answerText);

      const barsHtml = names.map((n, i) => `
        <div class="bar-row">
          <div>${n}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100, janUnits[i] * 3)}%"></div></div>
          <div>${janUnits[i]}</div>
        </div>`).join('');

      const visualHtml = `
        <div class="chart">
          <div class="center"><strong>January profit from used car sales</strong></div>
          <div class="small center">1 bar unit = $${scale}</div>
          ${barsHtml}
          <div class="mt12 small">Average working hours per month: ${names[0]} ${hours[0]}, ${names[1]} ${hours[1]}, ${names[2]} ${hours[2]}</div>
          <div class="small">Wages for all: $${wage} per hour</div>
        </div>
      `;

      return {
        topic: 'numerical',
        topicLabel: 'Numerical reasoning',
        variantKey: 'numerical-bar-profit',
        timer: getTimerSeconds('numerical', difficulty),
        prompt: 'In January, who had enough sales to earn their own wages?',
        visualHtml,

            <div class="diagram-cell missing">?</div>
          </div>
          <div class="small center mt8">Choose the figure that is the mirror image across the ${axis} axis.</div>
        </div>
      `;
      return {
        topic: 'logical',
        topicLabel: 'Abstract logical reasoning',
        variantKey: `logical-symmetry-${axis}`,
        timer: getTimerSeconds('logical', difficulty),
        prompt: 'Which option completes the symmetry rule?',
        visualHtml,
        options: options.map(v => ({ text: v, plain: v })),
        correctIndex,
        explanation: `Reflect the figure across the ${axis} axis, so the filled corner switches to the mirrored side.`,
        pattern: 'In symmetry questions, keep the shape the same and flip only its orientation across the stated axis.'
      };
    }

    function logicalMatrix(difficulty) {
      const rows = [
        ['▲', '▲▲', '▲▲▲'],
        ['●', '●●', '●●●']
      ];
      const answerBase = pick(['■', '◆']);
      const thirdRow = [answerBase, answerBase + answerBase, answerBase + answerBase + answerBase];
      const options = shuffle([
        thirdRow[2],
        thirdRow[1],
        answerBase,
        answerBase + answerBase + answerBase + answerBase
      ]);
      const correctIndex = options.indexOf(thirdRow[2]);
      const visualHtml = `
        <div class="chart">
          <div class="center"><strong>Matrix completion</strong></div>
          <div class="diagram-grid" style="grid-template-columns:repeat(3, 1fr);">
            ${rows[0].map(cell => `<div class="diagram-cell">${cell}</div>`).join('')}
            ${rows[1].map(cell => `<div class="diagram-cell">${cell}</div>`).join('')}
            <div class="diagram-cell">${thirdRow[0]}</div>
            <div class="diagram-cell">${thirdRow[1]}</div>
            <div class="diagram-cell missing">?</div>
          </div>
        </div>
      `;
      return {
        topic: 'logical',
        topicLabel: 'Abstract logical reasoning',
        variantKey: `logical-matrix-${answerBase}`,
        timer: getTimerSeconds('logical', difficulty),
        prompt: 'Which option completes the 3×3 matrix?',
        visualHtml,
        options: options.map(v => ({ text: v, plain: v })),
        correctIndex,
        explanation: 'Each row keeps the same shape, while each column increases the number of symbols from 1 to 3.',
        pattern: 'For matrix questions, check what changes by row and what changes by column separately.'
      };
    }

    function generateConcentration(difficulty) {
      const q = generateErrorCheck(difficulty);
      return {
        ...q,
        topic: 'concentration',
        topicLabel: 'Concentration',
        timer: getTimerSeconds('concentration', difficulty),
        prompt: 'Identify the mismatching line as quickly and accurately as possible.'
      };
    }

    function generatePlanning(difficulty) {
      const tasks = ['Assembly', 'Inspection', 'Packing', 'Dispatch'];
      const durations = tasks.map(() => randInt(20, 55));
      const slotStart = pick([480, 510, 540]);
      const breakStart = pick([600, 615, 630]);
      const idx = randInt(0, tasks.length - 1);
      const finish = slotStart + durations.slice(0, idx + 1).reduce((a, b) => a + b, 0);
      const finishDisplay = `${String(Math.floor(finish / 60)).padStart(2, '0')}:${String(finish % 60).padStart(2, '0')}`;
      const visualHtml = `
        <div class="chart">
          <div class="center"><strong>Shift plan</strong></div>
          <div class="review-list">
            <div class="review-item">Start time: ${String(Math.floor(slotStart / 60)).padStart(2, '0')}:${String(slotStart % 60).padStart(2, '0')}</div>
            ${tasks.map((task, i) => `<div class="review-item">${task}: ${durations[i]} minutes</div>`).join('')}
            <div class="review-item">Break starts at ${String(Math.floor(breakStart / 60)).padStart(2, '0')}:${String(breakStart % 60).padStart(2, '0')}</div>
          </div>
        </div>
      `;
      const options = shuffle([
        finishDisplay,
        `${String(Math.floor((finish + 15) / 60)).padStart(2, '0')}:${String((finish + 15) % 60).padStart(2, '0')}`,
        `${String(Math.floor((finish - 10) / 60)).padStart(2, '0')}:${String((finish - 10) % 60).padStart(2, '0')}`,
        `${String(Math.floor(breakStart / 60)).padStart(2, '0')}:${String(breakStart % 60).padStart(2, '0')}`
      ].filter((v, i, a) => a.indexOf(v) === i));
      return {
        topic: 'planning',
        topicLabel: 'Planning',
        timer: getTimerSeconds('planning', difficulty),
        prompt: `At what time should ${tasks[idx]} finish if tasks are done in the listed order?`,
        visualHtml,
        options: options.map(v => ({ text: v, plain: v })),
        correctIndex: options.indexOf(finishDisplay),
        explanation: `Add the durations from the shift start up to ${tasks[idx]}. That gives a finish time of ${finishDisplay}.`,
        pattern: 'For planning questions, build the timeline in sequence and ignore unrelated times unless the prompt asks for them.'
      };
    }

    function generateQuantitative(difficulty) {
      const types = difficulty === 'easy'
        ? ['comparison', 'ratio']
        : difficulty === 'medium'
        ? ['comparison', 'ratio', 'algebra', 'table-total']
        : ['comparison', 'ratio', 'algebra', 'table-total', 'percent-change'];
      const type = pick(types);
      if (type === 'comparison') return quantitativeComparison(difficulty);
      if (type === 'ratio') return quantitativeRatio(difficulty);
      if (type === 'algebra') return quantitativeAlgebra(difficulty);
      if (type === 'table-total') return quantitativeTableTotal(difficulty);
      return quantitativePercentChange(difficulty);
    }

    function quantitativeComparison(difficulty) {
      const a = randInt(12, 40);
      const b = randInt(3, 12);
      const left = a * b;
      const right = difficulty === 'hard' ? (a + b) * (b + 1) : a * (b + 1);
      const relation = left > right ? 'Quantity A is greater' : left < right ? 'Quantity B is greater' : 'The two quantities are equal';
      const options = ['Quantity A is greater', 'Quantity B is greater', 'The two quantities are equal', 'Cannot be determined'];
      return {
        topic: 'quantitative',
        topicLabel: 'AP Quantitative',
        variantKey: 'quantitative-comparison',
        timer: getTimerSeconds('quantitative', difficulty),
        prompt: 'Compare the two quantities.',
        visualHtml: `<div class="chart"><div class="review-list"><div class="review-item">Quantity A: ${a} × ${b}</div><div class="review-item">Quantity B: ${difficulty === 'hard' ? `(${a} + ${b}) × (${b} + 1)` : `${a} × (${b} + 1)`}</div></div></div>`,
        options: options.map(v => ({ text: v, plain: v })),
        correctIndex: options.indexOf(relation),
        explanation: 'Evaluate both quantities directly, then compare the results.',
        pattern: 'In quantitative comparison, simplify both sides before deciding.'
      };
    }

    function quantitativeRatio(difficulty) {
      const blue = randInt(12, 30);
      const red = randInt(8, 24);
      const add = pick([2, 3, 4, 5]);
      const result = `${blue}:${red + add}`;
      const options = shuffle([result, `${blue + add}:${red}`, `${blue}:${red}`, `${blue + add}:${red + add}`]);
      return {
        topic: 'quantitative',
        topicLabel: 'AP Quantitative',
        variantKey: 'quantitative-ratio',
        timer: getTimerSeconds('quantitative', difficulty),
        prompt: `A box has blue:red counters in the ratio ${blue}:${red}. If ${add} red counters are added, what is the new ratio blue:red?`,
        visualHtml: `<div class="chart"><div class="statement">Initial ratio blue:red = ${blue}:${red}</div></div>`,
        options: options.map(v => ({ text: v, plain: v })),
        correctIndex: options.indexOf(result),
        explanation: `Only the red part changes. Blue stays ${blue}; red becomes ${red + add}.`,
        pattern: 'In ratio updates, change only the quantity mentioned in the prompt.'
      };
    }

    function quantitativeAlgebra(difficulty) {
      const x = randInt(4, 14);
      const add = randInt(3, 10);
      const mult = pick([2, 3, 4]);
      const total = mult * x + add;
      const options = shuffle([x, x + 1, Math.max(1, x - 2), x + 3].filter((v, i, a) => a.indexOf(v) === i));
      return {
        topic: 'quantitative',
        topicLabel: 'AP Quantitative',
        variantKey: 'quantitative-algebra',
        timer: getTimerSeconds('quantitative', difficulty),
        prompt: 'Solve for x.',
        visualHtml: `<div class="chart"><div class="center"><strong>Equation</strong></div><div class="question-text" style="font-size:32px;">${mult}x + ${add} = ${total}</div></div>`,
        options: options.map(v => ({ text: String(v), plain: String(v) })),
        correctIndex: options.indexOf(x),
        explanation: `Subtract ${add} from both sides, then divide by ${mult}.`,
        pattern: 'Reverse operations in order: subtract or add first, then divide.'
      };
    }

    function quantitativeTableTotal(difficulty) {
      const rows = ['A', 'B', 'C'];
      const q1 = rows.map(() => randInt(18, 45));
      const q2 = rows.map(() => randInt(18, 45));
      const idx = randInt(0, rows.length - 1);
      const total = q1[idx] + q2[idx];
      const options = shuffle([total, q1[idx], q2[idx], total + 6].filter((v, i, a) => a.indexOf(v) === i));
      return {
        topic: 'quantitative',
        topicLabel: 'AP Quantitative',
        variantKey: 'quantitative-table-total',
        timer: getTimerSeconds('quantitative', difficulty),
        prompt: `What is the two-period total for row ${rows[idx]}?`,
        visualHtml: `<div class="chart"><div class="review-list">${rows.map((r, i) => `<div class="review-item">Row ${r}: Period 1 = ${q1[i]}, Period 2 = ${q2[i]}</div>`).join('')}</div></div>`,
        options: options.map(v => ({ text: String(v), plain: String(v) })),
        correctIndex: options.indexOf(total),
        explanation: `For row ${rows[idx]}, add Period 1 and Period 2.`,
        pattern: 'For table totals, isolate the correct row before adding.'
      };
    }

    function quantitativePercentChange(difficulty) {
      const start = randInt(40, 120);
      const pct = pick([10, 15, 20, 25]);
      const end = Math.round(start * (1 + pct / 100));
      const options = shuffle([end, start + pct, start, Math.round(start * (pct / 100))].filter((v, i, a) => a.indexOf(v) === i));
      return {
        topic: 'quantitative',
        topicLabel: 'AP Quantitative',
        variantKey: 'quantitative-percent-change',
        timer: getTimerSeconds('quantitative', difficulty),
        prompt: `A value of ${start} increases by ${pct}%. What is the new value?`,
        visualHtml: `<div class="chart"><div class="statement">Start value: ${start}<br>Increase: ${pct}%</div></div>`,
        options: options.map(v => ({ text: String(v), plain: String(v) })),
        correctIndex: options.indexOf(end),
        explanation: `Find ${pct}% of ${start}, then add it to the starting value.`,
        pattern: 'Percent increase = original × (1 + percent).'
      };
    }

    function generateVerbal(difficulty) {
      const sets = [

        {
          text: 'No employee may enter the lab without a badge. Some visitors were given temporary badges.',

        {
          text: 'Only products tested in Room A were shipped on Monday. Product X was shipped on Monday.',

        },
        {
          text: 'Every apprentice in Team Blue passed the safety briefing. Nadia is in Team Blue.',

          answer: 'True',
          explanation: 'If every apprentice in Team Blue passed, then Nadia passed because she is in Team Blue.'
        },
        {
          text: 'Some orders placed before noon were dispatched on Tuesday. Order 417 was placed before noon.',
          statement: 'Order 417 was dispatched on Tuesday.',
          answer: 'Cannot say',
          explanation: 'Only some orders placed before noon were dispatched Tuesday. We do not know whether order 417 was one of them.'
        },
        {
          text: 'No machine can be started unless the guard is closed. Machine R started successfully.',
          statement: 'The guard on Machine R was closed.',
          answer: 'True',
          explanation: 'The guard being closed is required for startup, so a successful start means the guard was closed.'
        }
      ];
      const item = pick(sets);
      const options = ['True', 'False', 'Cannot say'];
      const correctIndex = options.indexOf(item.answer);
      return {
        topic: 'verbal',
        topicLabel: 'Verbal reasoning',
        variantKey: `verbal-${item.statement}`,
        timer: getTimerSeconds('verbal', difficulty),
        prompt: 'Is the statement True, False, or Cannot say?',
        visualHtml: `<div class="chart"><div><strong>Text</strong></div><div class="mt8">${item.text}</div><div class="statement"><strong>Statement:</strong> ${item.statement}</div></div>`,
        options: options.map(v => ({ text: v, plain: v })),
        correctIndex,
        explanation: item.explanation,
        pattern: `Do not use real-world assumptions. Use only the text. Distinguish False from Cannot say.`
      };
    }

      const items = [

          `,
          options: ['System A', 'System B', 'Both need the same effort', 'Cannot say'],
          answer: 'System B',
          explanation: 'More supporting rope segments create more mechanical advantage, so less force is needed.'
        },
        {
          prompt: 'A metal rod is heated. What usually happens to its length?',
          visualHtml: `
            <div class="chart">
              <div class="center"><strong>Thermal expansion</strong></div>
              <svg viewBox="0 0 360 120" width="100%" height="120" style="display:block;margin-top:10px;">
                <rect x="40" y="35" width="110" height="18" rx="8" fill="#94a3b8"></rect>
                <text x="95" y="28" text-anchor="middle" font-size="14">Before heating</text>

              </svg>

      ];
      const item = pick(items);
      const options = difficulty === 'hard'
        ? shuffle(item.options)
        : item.options;
      return {
        topic: 'mechanical',
        topicLabel: 'Mechanical reasoning',
        variantKey: `mechanical-${item.prompt}`,
        timer: getTimerSeconds('mechanical', difficulty),
        prompt: item.prompt,
        visualHtml: item.visualHtml,
        options: options.map(v => ({ text: v, plain: v })),
        correctIndex: options.indexOf(item.answer),
        explanation: item.explanation,
        pattern: 'Check the basic rule first: opposite gear direction, longer ramp means less force, longer effort arm means more leverage.'

    }

    // INIT
    renderHome();
